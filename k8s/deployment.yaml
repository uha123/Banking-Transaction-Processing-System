apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-transaction-system
  labels:
    app: banking-transaction-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-transaction-system
  template:
    metadata:
      labels:
        app: banking-transaction-system
    spec:
      containers:
        - name: banking-app
          image: banking-transaction-system:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: banking-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
