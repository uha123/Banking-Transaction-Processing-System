server:
  port: 8080

spring:
  r2dbc:
    url: r2dbc:h2:mem:///testdb
    username: sa
    password:

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  liquibase:
    enabled: false

  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    com.banking.transaction: DEBUG
